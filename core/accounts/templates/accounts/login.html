<!doctype html>
<html>
	<head>
		<title>Login</title>

		<style>
			body {
				margin: 0;
				font-family: "Segoe UI", Arial, sans-serif;
				background: linear-gradient(135deg, #4caf50, #2e7d32);
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.container {
				background: white;
				padding: 40px 35px;
				border-radius: 15px;
				width: 340px;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
				animation: fadeIn 0.5s ease-in-out;
			}

			h2 {
				text-align: center;
				margin-bottom: 10px;
				color: #2e7d32;
			}

			.subtitle {
				text-align: center;
				font-size: 13px;
				color: #777;
				margin-bottom: 25px;
			}

			input {
				width: 100%;
				padding: 12px;
				margin-bottom: 15px;
				border: 1px solid #ddd;
				border-radius: 8px;
				outline: none;
				transition: 0.2s;
			}

			input:focus {
				border-color: #4caf50;
				box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
			}

			button {
				width: 100%;
				padding: 12px;
				background: #4caf50;
				color: white;
				border: none;
				border-radius: 8px;
				font-weight: bold;
				cursor: pointer;
				transition: 0.3s;
			}

			button:hover {
				background: #43a047;
				transform: translateY(-1px);
			}

			.link {
				text-align: center;
				margin-top: 15px;
				font-size: 14px;
			}

			.link a {
				color: #2e7d32;
				text-decoration: none;
				font-weight: bold;
			}

			.link a:hover {
				text-decoration: underline;
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(15px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h2>Welcome Back</h2>
			<div class="subtitle">Login to your account</div>

			<form method="POST">
				{% csrf_token %}
				<input type="email" name="email" placeholder="Email" required />
				<input type="password" name="password" placeholder="Password" required />
				<button type="submit">Login</button>
			</form>

			<div class="link">Don't have an account? <a href="/register/">Register</a></div>
		</div>
	</body>
</html>
