{% load static %}
<!doctype html>
<html>
	<head>
		<title>Login</title>

		<!-- ✅ FIX 1: correct CSS file -->
		<link rel="stylesheet" href="{% static 'css/styles.css' %}" />

		<style>
			body {
				background: linear-gradient(135deg, #4caf50, #2e7d32);
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.auth-card {
				background: white;
				padding: 40px 35px;
				border-radius: 15px;
				width: 340px;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
			}

			.subtitle {
				text-align: center;
				font-size: 13px;
				color: #777;
				margin-bottom: 20px;
			}

			.error {
				background: #fdecea;
				color: #d32f2f;
				padding: 10px;
				border-radius: 6px;
				margin-bottom: 10px;
				font-size: 13px;
			}

			.demo {
				background: #f1f8e9;
				padding: 10px;
				border-radius: 6px;
				font-size: 12px;
				margin-bottom: 15px;
				color: #33691e;
			}

			.link {
				text-align: center;
				margin-top: 15px;
				font-size: 14px;
			}

			.link a {
				color: #2e7d32;
				font-weight: bold;
				text-decoration: none;
			}
		</style>
	</head>

	<body data-user-id="{{ request.session.user_id }}">
		<div class="auth-card">
			<h2 style="text-align: center">Welcome Back</h2>

			<div class="subtitle">Login to access your AI-powered profile</div>

			<!-- DEMO LOGIN -->
			<div class="demo">
				Demo Login:<br />
				Email: hire-me@anshumat.org<br />
				Password: HireMe@2025!
			</div>

			<!-- ERROR -->
			{% if error %}
			<div class="error">{{ error }}</div>
			{% endif %}

			<form method="POST" id="loginForm">
				{% csrf_token %}

				<input type="email" name="email" placeholder="Email" required />
				<input type="password" name="password" placeholder="Password" required />

				<button type="submit" id="loginBtn">Login</button>
			</form>

			<div class="link">
				Don't have an account?
				<a href="/register/">Register</a>
			</div>

			<!-- ✅ FIX 2: redirect if already logged in -->
			{% if request.session.user_id %}
			<div style="text-align: center; margin-top: 10px">
				<a href="/dashboard/" class="btn btn-secondary"> Go to Dashboard </a>
			</div>
			{% endif %}
		</div>

		<script src="{% static 'js/login.js' %}"></script>
	</body>
</html>
