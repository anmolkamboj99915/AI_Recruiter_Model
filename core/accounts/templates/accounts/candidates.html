<!doctype html>
<html>
	<head>
		<title>Candidates</title>

		<style>
			body {
				margin: 0;
				font-family: "Segoe UI", Arial, sans-serif;
				background: #f4f6f8;
			}

			/* NAVBAR */
			.navbar {
				background: #2e7d32;
				color: white;
				padding: 15px 30px;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}

			.navbar h2 {
				margin: 0;
			}

			.nav-links a {
				color: white;
				text-decoration: none;
				margin-left: 15px;
				font-weight: bold;
			}

			.nav-links a:hover {
				text-decoration: underline;
			}

			/* MAIN */
			.container {
				max-width: 900px;
				margin: 40px auto;
				padding: 0 20px;
			}

			.title {
				text-align: center;
				margin-bottom: 30px;
				color: #333;
			}

			/* CARDS */
			.card {
				background: white;
				padding: 22px;
				margin-bottom: 18px;
				border-radius: 12px;
				box-shadow: 0 5px 12px rgba(0, 0, 0, 0.08);
				transition: 0.3s;
			}

			.card:hover {
				transform: translateY(-3px);
			}

			.card h3 {
				margin-bottom: 8px;
				color: #2e7d32;
			}

			.summary {
				color: #555;
				margin-bottom: 10px;
			}

			.skills {
				margin-top: 10px;
				color: #444;
			}

			.skills span {
				background: #e8f5e9;
				padding: 5px 10px;
				border-radius: 15px;
				margin-right: 5px;
				display: inline-block;
				margin-top: 5px;
				font-size: 13px;
			}

			.empty {
				text-align: center;
				color: #777;
				margin-top: 40px;
			}
		</style>
	</head>

	<body>
		<!-- NAVBAR -->
		<div class="navbar">
			<h2>AI Recruiter</h2>
			<div class="nav-links">
				<a href="/dashboard/">Dashboard</a>
				<a href="/ai-builder/">AI Builder</a>
				<a href="/logout/">Logout</a>
			</div>
		</div>

		<!-- MAIN -->
		<div class="container">
			<h2 class="title">All Candidates</h2>

			{% if candidates %} {% for c in candidates %}
			<div class="card">
				<h3>{{ c.name }}</h3>
				<p class="summary">{{ c.summary }}</p>

				<div class="skills">
					<strong>Skills:</strong><br />
					{% for skill in c.skills %}
					<span>{{ skill }}</span>
					{% endfor %}
				</div>
			</div>
			{% endfor %} {% else %}
			<p class="empty">No candidates available</p>
			{% endif %}
		</div>
	</body>
</html>
