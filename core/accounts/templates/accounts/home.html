<!doctype html>
<html>
	<head>
		<title>AI Recruiter</title>

		<style>
			body {
				margin: 0;
				font-family: "Segoe UI", Arial, sans-serif;
				background: linear-gradient(135deg, #4caf50, #2e7d32);
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.container {
				background: white;
				padding: 50px 40px;
				border-radius: 15px;
				text-align: center;
				width: 350px;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
				animation: fadeIn 0.6s ease-in-out;
			}

			h1 {
				margin-bottom: 10px;
				color: #2e7d32;
			}

			.subtitle {
				color: #777;
				font-size: 14px;
				margin-bottom: 30px;
			}

			.btn {
				display: block;
				width: 100%;
				padding: 12px;
				margin: 10px 0;
				text-decoration: none;
				border-radius: 8px;
				font-weight: bold;
				transition: 0.3s;
			}

			.btn-login {
				background: #4caf50;
				color: white;
			}

			.btn-login:hover {
				background: #43a047;
				transform: translateY(-2px);
			}

			.btn-register {
				background: #e8f5e9;
				color: #2e7d32;
				border: 1px solid #4caf50;
			}

			.btn-register:hover {
				background: #c8e6c9;
				transform: translateY(-2px);
			}

			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(15px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<h1>AI Recruiter</h1>
			<div class="subtitle">Smart Hiring & Candidate Management</div>

			<a href="/login/" class="btn btn-login">Login</a>
			<a href="/register/" class="btn btn-register">Create Account</a>
		</div>
	</body>
</html>
