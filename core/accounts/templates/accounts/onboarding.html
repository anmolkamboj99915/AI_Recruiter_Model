{% load static %}
<!doctype html>
<html>
	<head>
		<title>Onboarding - AI Recruiter</title>

		<!-- ✅ FIX 1: correct CSS file -->
		<link rel="stylesheet" href="{% static 'css/styles.css' %}" />
	</head>

	<body data-user-id="{{ request.session.user_id }}">
		<!-- NAVBAR -->
		<div class="navbar">
			<h2>Welcome to AI Recruiter</h2>
		</div>

		<div class="container">
			<!-- HEADER -->
			<div class="card">
				<h2>Set Up Your Profile</h2>
				<p style="font-size: 13px; color: #777">No resume needed. AI will help structure your profile automatically.</p>
			</div>

			<!-- BASIC INFO -->
			<div class="section">
				<h3>Basic Information</h3>

				<input type="text" id="name" placeholder="Full Name" />
				<input type="email" id="email" placeholder="Email Address" />

				<div id="errorMsg" style="color: red; font-size: 12px"></div>
			</div>

			<!-- ROLE -->
			<div class="section">
				<h3>Select Your Role</h3>

				<select id="role">
					<option value="candidate">Candidate (Build profile with AI)</option>
					<option value="recruiter">Recruiter (Browse candidates)</option>
				</select>
			</div>

			<!-- SKILLS -->
			<div class="section" id="skillsSection">
				<h3>Your Skills</h3>
				<input type="text" id="skills" placeholder="React, Django, Python" />
			</div>

			<!-- COMPANY -->
			<div class="section" id="companySection" style="display: none">
				<h3>Company Info</h3>
				<input type="text" id="company" placeholder="Company Name" />
			</div>

			<!-- CTA -->
			<button id="startBtn" class="btn btn-primary">Continue →</button>

			<!-- ✅ FIX 2: consistent spacing -->
			<div id="status" style="margin-top: 12px; font-size: 13px; color: #666"></div>
		</div>

		<script src="{% static 'js/onboarding.js' %}"></script>
	</body>
</html>
